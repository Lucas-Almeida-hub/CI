name: Reusable Build

on:
  workflow_call:
    inputs:
      build-commands:
        description: 'Comandos de build (multi-linha ou separados por &&)'
        required: true
        type: string
      working-directory:
        description: 'Diretório de trabalho relativo ao repositório'
        required: false
        type: string
      shell:
        description: 'Shell para execução (bash, pwsh, sh)'
        required: false
        type: string
        default: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run build commands
        run: |
          set -e
          if [ -n "${{ inputs.working-directory }}" ]; then
            cd "${{ inputs.working-directory }}"
          fi
          echo "=> Executando comandos de build"
          printf "%s\n" "${{ inputs.build-commands }}" > /tmp/ci-build-commands.sh
          if [ "${{ inputs.shell }}" = "pwsh" ]; then
            pwsh -File /tmp/ci-build-commands.sh
          else
            bash /tmp/ci-build-commands.sh
          fi
