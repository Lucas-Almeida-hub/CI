name: Reusable Lint

on:
  workflow_call:
    inputs:
      lint-commands:
        description: 'Comandos de lint (multi-linha ou separados por &&)'
        required: true
        type: string
      working-directory:
        description: 'Diretório de trabalho relativo ao repositório'
        required: false
        type: string
      shell:
        description: 'Shell para execução (bash, pwsh, sh)'
        required: false
        type: string
        default: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint commands
        run: |
          set -e
          if [ -n "${{ inputs.working-directory }}" ]; then
            cd "${{ inputs.working-directory }}"
          fi
          echo "=> Executando comandos de lint"
          printf "%s
" "${{ inputs.lint-commands }}" > /tmp/ci-lint-commands.sh
          if [ "${{ inputs.shell }}" = "pwsh" ]; then
            pwsh -File /tmp/ci-lint-commands.sh
          else
            bash /tmp/ci-lint-commands.sh
          fi
