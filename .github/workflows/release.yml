
name: Reusable Release

on:
  workflow_call:
    inputs:
      release-commands:
        description: 'Comandos de release/publish (multi-linha ou separados por &&)'
        required: false
        type: string
      working-directory:
        description: 'Diretório de trabalho relativo ao repositório'
        required: false
        type: string
      shell:
        description: 'Shell para execução (bash, pwsh, sh)'
        required: false
        type: string
        default: bash
      docker-push:
        description: 'Se true, constrói e envia imagem para registro (ex: Docker Hub)'
        required: false
        type: boolean
        default: false
      image:
        description: 'Nome da imagem/namespace (ex: user/repo) — opcional se passar full tags'
        required: false
        type: string
      tags:
        description: 'Lista de tags completas separadas por vírgula (ex: user/repo:latest,user/repo:1.0.0)'
        required: false
        type: string
      dockerfile:
        description: 'Caminho para Dockerfile'
        required: false
        type: string
        default: Dockerfile
      context:
        description: 'Contexto de build'
        required: false
        type: string
        default: .
      registry:
        description: 'Registro (ex: docker.io)'
        required: false
        type: string
        default: docker.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run release commands
        if: ${{ inputs.release-commands != '' }}
        run: |
          set -e
          if [ -n "${{ inputs.working-directory }}" ]; then
            cd "${{ inputs.working-directory }}"
          fi
          echo "=> Executando comandos de release"
          ${{ inputs.release-commands }}
        shell: ${{ inputs.shell }}

      - name: Validate docker push inputs
        if: ${{ inputs.docker-push == true }}
        run: |
          if [ -z "${{ inputs.tags }}" ]; then
            echo "Erro: 'tags' é obrigatório quando 'docker-push' é true" >&2
            exit 1
          fi

      - name: Set up QEMU
        if: ${{ inputs.docker-push == true }}
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        if: ${{ inputs.docker-push == true }}
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        if: ${{ inputs.docker-push == true }}
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ inputs.docker-push == true }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ inputs.tags }}

