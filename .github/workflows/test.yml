name: Reusable Test

on:
  workflow_call:
    inputs:
      test-commands:
        description: 'Comandos de teste (multi-linha ou separados por &&)'
        required: true
        type: string
      working-directory:
        description: 'Diretório de trabalho relativo ao repositório'
        required: false
        type: string
      # Nota: suporte a multiplos shells removido por compatibilidade; executa via bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test commands
        run: |
          set -e
          if [ -n "${{ inputs.working-directory }}" ]; then
            cd "${{ inputs.working-directory }}"
          fi
          echo "=> Executando comandos de teste"
          printf "%s\n" "${{ inputs.test-commands }}" > /tmp/ci-test-commands.sh
          bash /tmp/ci-test-commands.sh
